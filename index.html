<!DOCTYPE html>
<html lang="th">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/ico" href="https://kanpao.github.io/images/favicon.ico">
  <link rel="icon" href="https://kanpao.github.io/images/favicon.png" sizes="16x16 32x32 64x64" type="image/png">
  <title>ผลคะแนนเลือกตั้งสมาชิกสภา อบจ. และนายก อบจ.กาญจนบุรี</title>
  <meta name="description" content="เกาะติดผลคะแนนเลือกตั้งสมาชิกสภา อบจ. และนายก อบจ.กาญจนบุรี แบบเรียลไทม์ (อย่างไม่เป็นทางการ)">

  <meta property="og:type" content="website">
  <meta property="og:url" content="https://kanpao.github.io/election/">
  <meta property="og:title" content="🔴 เกาะติดผลคะแนนเลือกตั้ง ส.อบจ.กาญจนบุรี และนายก อบจ.กาญจนบุรี">
  <meta property="og:description" content="ดูผลคะแนนล่าสุด! การเลือกตั้ง ส.อบจ.กาญจนบุรี และนายก อบจ.กาญจนบุรี คลิกเพื่อดูรายละเอียด">
  <meta property="og:image" content="https://kanpao.github.io/election/images/share-cover-election.jpg">

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600;800&display=swap" rel="stylesheet">
  
  <style>
    * { font-family: 'Kanit', sans-serif; }
    .gradient-bg { background: linear-gradient(135deg, #1a3263 0%, #547792 100%); min-height: 100vh; display: flex; flex-direction: column; }
    .card-hover { transition: all 0.3s ease; }
    .card-hover:hover { transform: translateY(-5px); box-shadow: 0 20px 40px rgba(0,0,0,0.15); }
    
    .winner-card {
        background: linear-gradient(135deg, #FFFBEB 0%, #FFFFFF 100%) !important;
        border: 2px solid #FCD34D !important;
        position: relative;
        animation: glowPulse 2s infinite alternate;
        z-index: 10;
    }

    .shimmer-wrapper {
        position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        overflow: hidden; border-radius: inherit; pointer-events: none;
    }
    .shimmer-wrapper::before {
        content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
        background: linear-gradient(45deg, transparent, rgba(255, 215, 0, 0.4), transparent);
        animation: shimmer 3s linear infinite;
    }

    .bounce-anim { display: inline-block; animation: bounce 2s infinite; position: relative; z-index: 50; }

    @keyframes glowPulse {
        0% { box-shadow: 0 0 5px rgba(252, 211, 77, 0.2); }
        100% { box-shadow: 0 0 20px rgba(252, 211, 77, 0.6); border-color: #F59E0B; }
    }
    @keyframes shimmer {
        0% { transform: translateX(-100%) translateY(-100%) rotate(45deg); }
        100% { transform: translateX(100%) translateY(100%) rotate(45deg); }
    }
    @keyframes bounce {
        0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
        40% { transform: translateY(-10px); }
        60% { transform: translateY(-4px); }
    }

    .list-card { background: #FFFFFF; border: 1px solid rgba(0, 0, 0, 0.05); }
    .winner-spacing { margin-top: 60px !important; }
    .desktop-nav { display: none; flex-wrap: nowrap; justify-content: center; gap: 4px; overflow-x: auto; scrollbar-width: none; }
    .desktop-nav::-webkit-scrollbar { display: none; }
    @media (min-width: 1024px) { .desktop-nav { display: flex; } .mobile-nav-toggle { display: none; } }
    
    .badge-rank-1 { background: linear-gradient(135deg, #FFD700, #FFA500); color: #000; box-shadow: 0 0 10px rgba(255, 215, 0, 0.5); border: 2px solid #fff; }
    
    @keyframes trophyGlow {
      0%, 100% { transform: scale(1); filter: drop-shadow(0 0 10px rgba(255, 215, 0, 0.5)); }
      50% { transform: scale(1.3); filter: drop-shadow(0 0 25px rgba(255, 215, 0, 1)); }
    }
    .trophy-glow { display: inline-block; animation: trophyGlow 1.5s ease-in-out infinite; color: #FFD700; margin-right: 10px; }
    .solid-gold-trophy { filter: drop-shadow(0 0 8px rgba(255,215,0,0.8)) saturate(200%); }
  </style>
</head>
<body class="gradient-bg pb-10">
  
  <header class="sticky top-0 z-[100] bg-white/95 border-b border-blue-100 backdrop-blur-md px-4 py-3 shadow-md">
    <div class="container mx-auto flex justify-between items-center gap-4">
      <div class="flex items-center gap-2 md:gap-3 min-w-0 md:shrink-0">
        <img src="https://kanpao.github.io/images/kanpao-logo-160px.png" class="w-10 h-10 md:w-12 md:h-12 object-contain shrink-0" alt="Logo">
        <div class="min-w-0">
          <h1 id="main-header-title" class="text-sm sm:text-sm md:text-base font-black tracking-tight leading-tight uppercase text-slate-800">
            กำลังโหลดข้อมูล...
          </h1>
        </div>
      </div>
      <nav class="desktop-nav flex-1 px-2"></nav>
      
      <button onclick="toggleMobileMenu()" class="mobile-nav-toggle p-2 bg-blue-600 rounded-lg text-white shadow-md shrink-0">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7" /></svg>
      </button>
    </div>
  </header>

  <div id="live-badge" class="hidden fixed top-[75px] md:top-[85px] right-4 md:right-6 z-[90] items-center gap-1.5 bg-red-600 text-white px-2 py-1 md:px-3 md:py-1 rounded-md shadow-md animate-pulse">
    <div class="w-2 h-2 bg-white rounded-full"></div>
    <span class="text-[10px] md:text-xs font-black tracking-widest">LIVE</span>
  </div>

  <div id="mobile-menu" class="fixed inset-0 bg-[#1a3263]/98 z-[110] hidden flex-col p-6 overflow-y-auto">
    <div class="flex justify-between items-center mb-8">
      <h3 class="text-xl font-bold text-yellow-500 italic">เลือกเขตพื้นที่</h3>
      <button onclick="toggleMobileMenu()" class="p-2 text-white"><svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg></button>
    </div>
    <div id="mobile-nav-list" class="flex flex-col gap-3 text-center"></div>
  </div>

  <main class="container mx-auto px-4 max-w-4xl mt-10 flex-grow">
    <div class="mb-10 border-b border-white/20 pb-4 text-center md:text-left text-white drop-shadow-md">
      <h2 id="section-title" class="text-2xl md:text-4xl font-extrabold italic uppercase tracking-tight leading-snug">กำลังโหลด...</h2>
      <p id="update-time" class="text-[10px] text-white/70 mt-2 uppercase tracking-widest"></p>
    </div>
    <div id="content-list" class="flex flex-col gap-8"></div>
  </main>

  <footer class="text-center py-8 text-white/60 text-[10px] md:text-xs mt-10 border-t border-white/10 uppercase tracking-widest">
    &copy; 2026 All Rights Reserved Powered by <a href="https://www.facebook.com/artwansawang" target="_blank">Mr.Wansawang Kanchanakaree</a>
  </footer>

  <script>
    const DATA_URL = 'data.json'; 
    const baseMenuItems = ["สรุปภาพรวม", "นายก อบจ.", "เมืองกาญจนบุรี", "ท่ามะกา", "ท่าม่วง", "ทองผาภูมิ", "ด่านมะขามเตี้ย", "ศรีสวัสดิ์", "สังขละบุรี", "หนองปรือ", "ห้วยกระเจา", "ไทรโยค", "บ่อพลอย", "พนมทวน", "เลาขวัญ"];
    let activeMenuItems = [...baseMenuItems]; 
    let currentTab = ""; 
    let electionData = null;
    let hasFiredConfetti = false;
    let lastWinnerEffects = null; 

    function toggleMobileMenu() { document.getElementById('mobile-menu').classList.toggle('hidden'); }

    async function loadData() {
      try {
        const res = await fetch(DATA_URL + '?t=' + Date.now());
        const data = await res.json();
        if (data) {
          electionData = data;
          
          if (electionData.headerTitle) {
            document.getElementById('main-header-title').innerHTML = electionData.headerTitle;
          }
          
          activeMenuItems = baseMenuItems.filter(item => {
            if (item === "สรุปภาพรวม" && electionData.showSummaryTab === "OFF") return false;
            if (item === "นายก อบจ." && electionData.showMayorTab === "OFF") return false;
            return true;
          });

          if (!currentTab || !activeMenuItems.includes(currentTab)) {
            currentTab = activeMenuItems[0];
          }

          render();
          document.getElementById('update-time').innerText = "อัปเดตล่าสุด: " + new Date(data.lastUpdate).toLocaleTimeString();
        }
      } catch(e) { console.error("ไม่สามารถโหลดข้อมูลได้"); }
    }

    function launchFireworks() {
      if (hasFiredConfetti) return; 
      hasFiredConfetti = true;
      var duration = 10 * 1000;
      var animationEnd = Date.now() + duration;
      var defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 90 };
      function randomInRange(min, max) { return Math.random() * (max - min) + min; }
      var interval = setInterval(function() {
        var timeLeft = animationEnd - Date.now();
        if (timeLeft <= 0) return clearInterval(interval);
        var particleCount = 50 * (timeLeft / duration);
        confetti({ ...defaults, particleCount, origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 } });
        confetti({ ...defaults, particleCount, origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 } });
      }, 250);
    }

    function render() {
      if (!electionData) return;
      const { candidates, showWinnerEffects, showMayorTab } = electionData;
      const list = document.getElementById('content-list');
      const title = document.getElementById('section-title');
      const liveBadge = document.getElementById('live-badge'); 

      list.innerHTML = '';
      renderNavs();

      if (showWinnerEffects === 'ON') {
          liveBadge.classList.add('hidden');
          liveBadge.classList.remove('flex');
      } else {
          liveBadge.classList.remove('hidden');
          liveBadge.classList.add('flex');
      }

      if (lastWinnerEffects !== null && lastWinnerEffects !== showWinnerEffects && showWinnerEffects === 'ON') {
          hasFiredConfetti = false; 
      }
      lastWinnerEffects = showWinnerEffects;

      if (showWinnerEffects === 'ON') {
          launchFireworks();
      } else {
          hasFiredConfetti = false; 
      }

      const globalMayorScores = {};
      candidates.forEach(c => {
        if (c.zone && c.zone.toString().includes("นายก")) {
          const key = c.number + "_" + c.name;
          if (!globalMayorScores[key]) {
            globalMayorScores[key] = { ...c, score: 0, district: "นายก อบจ." };
          }
          globalMayorScores[key].score += parseInt(c.score) || 0;
        }
      });
      const mayorList = Object.values(globalMayorScores).sort((a,b) => b.score - a.score);
      const globalMayorTotalScore = mayorList.reduce((sum, c) => sum + parseInt(c.score || 0), 0); 

      // --- หน้าสรุปภาพรวม ---
      if (currentTab === "สรุปภาพรวม") {
        if (showWinnerEffects === 'ON') {
           title.innerHTML = '<span class="trophy-glow">🏆</span><span class="text-yellow-300">สรุปคะแนนสูงสุด</span> (อย่างไม่เป็นทางการ)';
        } else {
           title.innerHTML = '<span class="text-yellow-300">🏆 สรุปคะแนนสูงสุด</span> (อย่างไม่เป็นทางการ)';
        }
        
        if (mayorList.length > 0 && showMayorTab !== "OFF") {
           const distHeader = document.createElement('div');
           distHeader.className = "text-2xl md:text-4xl font-extrabold text-yellow-300 mt-10 mb-6 border-l-[6px] border-yellow-300 pl-4 drop-shadow-md";
           distHeader.innerText = "นายกองค์การบริหารส่วนจังหวัด (รวมทุกอำเภอ)";
           list.appendChild(distHeader);
           list.appendChild(createCard(mayorList[0], 1, globalMayorTotalScore, true, showWinnerEffects));
        }

        const allZones = {};
        candidates.forEach(c => {
          if (c.zone && c.zone.toString().includes("นายก")) return; 
          const key = c.district + '|' + c.zone; 
          if (!allZones[key]) allZones[key] = [];
          allZones[key].push(c);
        });

        const summaryByDistrict = {};
        Object.keys(allZones).forEach(key => {
          const cList = allZones[key];
          const zoneTotalScore = cList.reduce((sum, c) => sum + parseInt(c.score || 0), 0); 
          cList.sort((a,b) => b.score - a.score);
          if(cList.length > 0) {
            const winner = cList[0];
            winner._zoneTotalScore = zoneTotalScore; 
            const dist = winner.district;
            if(!summaryByDistrict[dist]) summaryByDistrict[dist] = [];
            summaryByDistrict[dist].push(winner);
          }
        });

        const sortedDistricts = Object.keys(summaryByDistrict).sort((a,b) => baseMenuItems.indexOf(a) - baseMenuItems.indexOf(b));

        sortedDistricts.forEach(dist => {
           const distHeader = document.createElement('div');
           distHeader.className = "text-2xl md:text-4xl font-extrabold text-white mt-10 mb-6 border-l-[6px] border-white pl-4 drop-shadow-md opacity-90";
           distHeader.innerText = `อ.${dist}`;
           list.appendChild(distHeader);

           const winners = summaryByDistrict[dist].sort((a,b) => parseInt(a.zone||0) - parseInt(b.zone||0));
           winners.forEach(winner => {
             list.appendChild(createCard(winner, 1, winner._zoneTotalScore, true, showWinnerEffects));
           });
        });

      // --- หน้านายก อบจ. ---
      } else if (currentTab === "นายก อบจ.") {
        if (showWinnerEffects === 'ON') {
            title.innerHTML = '<span class="trophy-glow">🏆</span> ผลคะแนนรวม นายก อบจ.กาญจนบุรี (นับรวมทุกอำเภอ)';
        } else {
            title.innerText = "ผลคะแนนรวม นายก อบจ.กาญจนบุรี (นับรวมทุกอำเภอ)";
        }
        mayorList.forEach((c, i) => list.appendChild(createCard(c, i+1, globalMayorTotalScore, false, showWinnerEffects)));

      // --- หน้าแต่ละอำเภอ ---
      } else {
        if (showWinnerEffects === 'ON') {
            title.innerHTML = `<span class="trophy-glow">🏆</span> ผลการเลือกตั้ง เขตอำเภอ${currentTab}`;
        } else {
            title.innerText = `ผลการเลือกตั้ง เขตอำเภอ${currentTab}`;
        }
        
        const distCandidates = candidates.filter(c => c.district === currentTab);
        
        const distMayors = distCandidates.filter(c => c.zone && c.zone.toString().includes("นายก")).sort((a,b) => b.score - a.score);
        if (distMayors.length > 0 && showMayorTab !== "OFF") {
           const mayorHeader = document.createElement('div');
           mayorHeader.className = "text-2xl md:text-4xl font-extrabold text-yellow-300 mt-10 mb-6 border-l-[6px] border-yellow-300 pl-4 drop-shadow-md";
           mayorHeader.innerText = `คะแนน นายก อบจ. (เฉพาะอำเภอ${currentTab})`;
           list.appendChild(mayorHeader);

           const distMayorTotalScore = distMayors.reduce((sum, c) => sum + parseInt(c.score || 0), 0);
           distMayors.forEach((c, i) => list.appendChild(createCard(c, i+1, distMayorTotalScore, false, showWinnerEffects)));
        }

        const councilCands = distCandidates.filter(c => !(c.zone && c.zone.toString().includes("นายก")));
        const zones = {};
        councilCands.forEach(c => { const z = c.zone || "ทั่วไป"; if(!zones[z]) zones[z] = []; zones[z].push(c); });
        const sortedZones = Object.keys(zones).sort((a,b) => parseInt(a) - parseInt(b));

        sortedZones.forEach(z => {
           const zoneHeader = document.createElement('div');
           zoneHeader.className = "text-2xl md:text-4xl font-extrabold text-white mt-10 mb-6 border-l-[6px] border-blue-400 pl-4 drop-shadow-md";
           zoneHeader.innerText = `ส.อบจ. เขต ${z}`;
           list.appendChild(zoneHeader);

           const cList = zones[z].sort((a,b) => b.score - a.score);
           const zoneTotalScore = cList.reduce((sum, c) => sum + parseInt(c.score || 0), 0);
           cList.forEach((c, i) => list.appendChild(createCard(c, i+1, zoneTotalScore, false, showWinnerEffects)));
        });

        if (distCandidates.length === 0) list.innerHTML = `<div class="text-center text-white/70 py-10 border border-dashed border-white/30 rounded-xl">ยังไม่มีข้อมูลในเขตนี้</div>`;
      }
    }

    function renderNavs() {
      const desktop = document.querySelector('.desktop-nav');
      const mobile = document.getElementById('mobile-nav-list');
      desktop.innerHTML = ''; mobile.innerHTML = '';

      activeMenuItems.forEach(item => {
        const active = currentTab === item;
        const dBtn = document.createElement('button');
        dBtn.className = `px-2 py-1.5 rounded-md text-[10px] xl:text-xs font-bold transition whitespace-nowrap ${active ? 'bg-yellow-500 text-slate-900 shadow-lg' : 'bg-white/80 text-slate-600 hover:bg-white border border-white'}`;
        dBtn.innerText = item;
        dBtn.onclick = () => { 
            currentTab = item; 
            if (item === "สรุปภาพรวม") hasFiredConfetti = false; 
            render(); 
        };
        desktop.appendChild(dBtn);

        const mBtn = document.createElement('button');
        mBtn.className = `w-full p-4 rounded-xl text-lg font-bold border ${active ? 'bg-yellow-500 text-slate-900 border-yellow-500' : 'bg-slate-800 text-white border-slate-700'}`;
        mBtn.innerText = item;
        mBtn.onclick = () => { 
            currentTab = item; 
            if (item === "สรุปภาพรวม") hasFiredConfetti = false; 
            toggleMobileMenu(); 
            render(); 
        };
        mobile.appendChild(mBtn);
      });
    }

    function createCard(c, rank, totalScore, isSum, winnerStatus) {
      const div = document.createElement('div');
      const pct = totalScore > 0 ? (c.score / totalScore) * 100 : 0;
      const pctText = pct.toFixed(2) + "%"; 
      const useFullEffect = (rank === 1 && winnerStatus === 'ON');

      const crown = useFullEffect ? '<div class="absolute -top-12 left-6 text-5xl bounce-anim">👑</div>' : '';
      const trophy = useFullEffect ? '<span class="ml-1 bounce-anim text-3xl solid-gold-trophy align-middle">🏆</span>' : '';
      const winnerText = useFullEffect ? '<p class="text-sm md:text-lg text-yellow-600 font-bold animate-pulse mt-1 drop-shadow-sm leading-tight">🏅 ผู้ชนะคะแนนเลือกตั้งอย่างไม่เป็นทางการ</p>' : '';

      // --- ส่วนจัดการสีตามพรรค (Custom Colors) ---
      // 1. สีขอบรูป Avatar (ใช้ border-[3px] ให้เส้นหนาขึ้นเพื่อให้เห็นสีชัดเจน)
      let avatarStyle = "";
      let avatarClass = "border-[3px]"; 
      
      if (c.color) {
          avatarStyle = `border-color: ${c.color};`;
          if (useFullEffect) avatarStyle += ` box-shadow: 0 0 15px ${c.color};`; // ถ้าชนะให้มีแสงเรืองแสงสีพรรค
      } else {
          // ถ้าไม่มีสีพรรค ให้ใช้สีพื้นฐาน (สีทองถ้าชนะ, สีเทาถ้าปกติ)
          avatarClass += useFullEffect ? " border-yellow-400 shadow-md" : " border-slate-300";
      }

      // 2. สีหลอดคะแนน Progress bar
      const barStyle = c.color 
          ? `width:${pct}%; background-color: ${c.color};` 
          : `width:${pct}%; background-image: linear-gradient(to right, #2563eb, #22d3ee);`;

      let districtLabel = "";
      if (isSum) {
         districtLabel = (c.district === "นายก อบจ.") ? "ผู้สมัครนายก อบจ." : `เขต ${c.zone}`; 
      } else if (c.district === "นายก อบจ." || (c.zone && c.zone.toString().includes("นายก"))) {
         districtLabel = "ผู้สมัครนายก อบจ.";
      }

      const mobileName = c.name.replace(' ', '<br class="md:hidden"> ');
      div.className = `list-card card-hover rounded-2xl p-6 flex items-center gap-4 ${useFullEffect ? 'winner-card winner-spacing' : 'bg-white shadow-md'}`;
      
      div.innerHTML = `
        ${useFullEffect ? '<div class="shimmer-wrapper"></div>' : ''}
        ${crown}
        <div class="relative shrink-0 z-10">
          <div class="w-20 h-20 md:w-24 md:h-24 rounded-full bg-slate-100 ${avatarClass} overflow-hidden flex items-center justify-center relative z-20" style="${avatarStyle}">
            ${(c.image && c.image.toString().startsWith('http')) 
              ? `<img src="${c.image}" class="w-full h-full object-cover">` 
              : `<span class="text-4xl font-black text-slate-400">${c.name.charAt(0)}</span>`
            }
          </div>
          <div class="absolute -bottom-1 -right-1 w-9 h-9 md:w-10 md:h-10 rounded-full flex items-center justify-center font-black z-30 ${rank === 1 ? 'badge-rank-1' : 'bg-slate-200 text-slate-600 border-2 border-white shadow-sm'} text-sm md:text-base">${c.number}</div>
        </div>
        <div class="flex-1 min-w-0 z-10 relative mt-1">
          ${districtLabel ? `<div class="text-base md:text-lg text-blue-600 font-extrabold uppercase mb-1 tracking-wider">${districtLabel}</div>` : ''}
          <div class="text-xl md:text-2xl font-black leading-tight ${rank === 1 ? 'text-slate-900' : 'text-slate-700'}">
            ${mobileName} ${trophy}
          </div>
          ${winnerText}
          <div class="w-full bg-slate-200 h-3 md:h-4 rounded-full mt-3 overflow-hidden shadow-inner">
            <div class="h-full transition-all duration-1000" style="${barStyle}"></div>
          </div>
        </div>
        <div class="text-right shrink-0 z-10 pl-2">
            <div class="text-[10px] md:text-xs text-slate-500 mb-1 font-bold tracking-tighter">คะแนน</div>
            <div class="text-3xl md:text-4xl font-black leading-none ${rank === 1 ? 'text-blue-600' : 'text-slate-800'}">${c.score.toLocaleString()}</div>
            <div class="text-[11px] md:text-sm font-bold text-slate-500 mt-1 bg-slate-100 rounded-md px-2 py-0.5 inline-block border border-slate-200">${pctText}</div>
        </div>
      `;
      return div;
    }

    setInterval(loadData, 30000);
    window.onload = loadData;
  </script>
</body>
</html>
